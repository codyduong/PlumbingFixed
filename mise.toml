# mise — standardized dev toolchain
# https://mise.jdx.dev  |  Install: winget install jdx.mise   (then: mise install)
#
# `mise install`      provisions the pinned tools below into an isolated per-project env.
# `mise tasks`        lists every workflow.
# `mise run <task>`   runs one.  `mise run <task> --help`  shows its arguments.
#
# Each task shells out to a PowerShell script in ./scripts (also runnable directly via
# `pwsh -File scripts/<name>.ps1`). Development happens on Windows; the sole exception is
# scripts/package.sh, kept for the Linux CI release job (.github/workflows/release.yml).
#
# Secrets for publishing (STEAM_USER, etc.) go in mise.local.toml — copy it from
# mise.local.toml.example. That file is git-ignored and auto-loaded with higher precedence.

min_version = "2026.4.0"

[settings]
windows_default_inline_shell_args = "pwsh -NoProfile -Command"
experimental = true

[tools]
stylua = "2.3.1"
"cargo:emmylua_check" = "0.18.0"
java = "temurin-17"
age = "1.3.1"

[env]
STEAM_USERNAME = { required = "Set STEAM_USERNAME to your Steam username in mise.local.toml" }
STEAM_PASSWORD = { required = "Set STEAM_PASSWORD to your Steam password in mise.local.toml" }

[tasks.check]
description = "Lint + type-check Lua (stylua + emmylua_check); mirrors CI"
run = "& scripts/check.ps1"

[tasks.decompile]
description = "Decompile the installed game into .decompiled/ for client/server analysis"
run = "& scripts/decompile.ps1"

[tasks.bump]
description = "Set the mod's semver in every mod.info (not the targeted PZ build)"
usage = 'arg "<version>" help="Mod semver to set, e.g. 1.3.14 (leading v optional)"'
run = '& scripts/bump-version.ps1 $env:usage_version'

[tasks.package]
description = "Validate mod.info versions against the tag, then build dist/PlumbingFixed"
usage = 'arg "<tag>" help="Release tag to validate against, e.g. v1.3.14"'
run = '& scripts/package.ps1 $env:usage_tag'

[tasks.deploy]
description = "Package + sync for in-game testing (client=Workshop dev dir, server=testhost mods dir)"
usage = 'arg "<target>" help="Where to deploy: client, server, or all"'
run = '& scripts/deploy-local.ps1 $env:usage_target'

[tasks.steam-login]
description = "Log in to steamcmd to cache the Steam session (password + Steam Guard prompt)"
raw = true
sources = ["~/AppData/Local/Microsoft/WinGet/Packages/Valve*/Config/config.vdf"]
run = 'steamcmd +login $env:STEAM_USERNAME $env:STEAM_PASSWORD +quit'

[tasks.publish]
description = "Publish to Steam Workshop via steamcmd (needs STEAM_USER; see mise.local.toml)"
raw = true
depends = ["steam-login"]
usage = '''
arg "<target>" help="Which item to publish: test or prod (required — no implicit target)"
arg "[changenote]" help="Workshop changenote for this update" default=""
'''
run = '& scripts/publish-workshop.ps1 $env:usage_target $env:usage_changenote'

[tasks.testhost]
description = "Run an ephemeral local dedicated server for MP testing (state in .testhost/)"
raw = true
usage = 'flag "--reset" help="Delete the .testhost world and reprovision from testhost/ seeds"'
run = '& scripts/testhost.ps1 -Reset:($env:usage_reset -eq "true")'

[tasks.vanilla-extract]
description = "Extract overridden vanilla fns into vendor/pz/<VERSION>/ (baseline for 3-way merges)"
run = "& scripts/vanilla-extract.ps1"

[tasks.vanilla-diff]
description = "Show how installed vanilla drifted from the committed baseline (overridden fns)"
run = "& scripts/vanilla-diff.ps1"
