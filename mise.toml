# mise — standardized dev toolchain for PlumbingFixed.
# https://mise.jdx.dev  |  Install: winget install jdx.mise   (then: mise install)
#
# `mise install`      provisions the pinned tools below into an isolated per-project env.
# `mise tasks`        lists every workflow.
# `mise run <task>`   runs one.  `mise run <task> --help`  shows its arguments.
#
# Each task shells out to a script in ./scripts — a POSIX `.sh` on Unix (`run`) and a
# PowerShell `.ps1` on Windows (`run_windows`) — so behavior is identical from mise or when
# invoked directly (`bash scripts/<name>.sh` / `pwsh -File scripts/<name>.ps1`).
#
# Secrets for publishing (STEAM_USER, etc.) go in mise.local.toml — copy it from
# mise.local.toml.example. That file is git-ignored and auto-loaded with higher precedence.

min_version = "2026.4.0"

[tools]
# Pinned to match .github/workflows/lua.yml exactly.
stylua = "2.3.1"
# emmylua_check is not in the mise registry; the cargo backend mirrors CI
# (`cargo install emmylua_check`). First install compiles from source (needs Rust).
"cargo:emmylua_check" = "0.18.0"
# Java 17+ for the decompiler (scripts/decompile.*). Zomboid Decompiler requires "Java 17
# or above"; Temurin 17 also matches the JVM Project Zomboid ships (jre64).
java = "temurin-17"

[tasks.check]
description = "Lint + type-check Lua (stylua + emmylua_check); mirrors CI"
run = "bash scripts/check.sh"
run_windows = "pwsh -NoProfile -File scripts/check.ps1"

[tasks.decompile]
description = "Decompile the installed game into .decompiled/ for client/server analysis"
run = "bash scripts/decompile.sh"
run_windows = "pwsh -NoProfile -File scripts/decompile.ps1"

[tasks.bump]
description = "Set the mod's semver in every mod.info (not the targeted PZ build)"
usage = 'arg "<version>" help="Mod semver to set, e.g. 1.3.14 (leading v optional)"'
run = 'bash scripts/bump-version.sh "${usage_version}"'
run_windows = 'pwsh -NoProfile -File scripts/bump-version.ps1 "%usage_version%"'

[tasks.package]
description = "Validate mod.info versions against the tag, then build ./PlumbingFixed"
usage = 'arg "<tag>" help="Release tag to validate against, e.g. v1.3.14"'
run = 'bash scripts/package.sh "${usage_tag}"'
run_windows = 'pwsh -NoProfile -File scripts/package.ps1 "%usage_tag%"'

[tasks.deploy]
description = "Package + sync into the local Zomboid Workshop dir for in-game testing"
run = "bash scripts/deploy-local.sh"
run_windows = "pwsh -NoProfile -File scripts/deploy-local.ps1"

[tasks.publish]
description = "Publish to Steam Workshop via steamcmd (needs STEAM_USER; see mise.local.toml)"
usage = 'arg "[changenote]" help="Workshop changenote for this update" default=""'
run = 'bash scripts/publish-workshop.sh "${usage_changenote}"'
run_windows = 'pwsh -NoProfile -File scripts/publish-workshop.ps1 "%usage_changenote%"'
