# PlumbingFixed ephemeral testhost seed config. Copied into .testhost/Server/ on first
# `mise run testhost`; keys missing here take server defaults and get written back on
# first boot. Blow the whole world away with: mise run testhost --reset
# The leading backslash in Mods= is the B42 activated-mod id form (the mod's 42/ build).
Mods=\PlumbingFixed
Map=Muldraugh, KY
Public=false
Open=true
UPnP=false
PauseEmpty=true
